version: '3.8'

services:
  # MySQL Database for Prescription Service
  prescription-db:
    image: mysql:8.0
    container_name: prescription-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prescription_db
      MYSQL_USER: prescription_user
      MYSQL_PASSWORD: prescription_pass
    ports:
      - "3307:3306"  # Map to 3307 to avoid conflicts with local MySQL
    volumes:
      - prescription-db-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d  # Optional: for initialization scripts
    networks:
      - medtrip-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Prescription Service
  prescription-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prescription-service
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:mysql://prescription-db:3306/prescription_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      
      # Medicine Service URL (update if medicine-service is also containerized)
      MEDICINE_SERVICE_URL: http://medicine-service:8081/api/medicines
      
      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      
      # Server Configuration
      SERVER_PORT: 8082
      
      # Java Options
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8082:8082"
    depends_on:
      prescription-db:
        condition: service_healthy
    networks:
      - medtrip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: If you want to add medicine-service in the same compose
  # Uncomment and configure if medicine-service is available
  # medicine-service:
  #   image: medicine-service:latest
  #   container_name: medicine-service
  #   ports:
  #     - "8081:8081"
  #   networks:
  #     - medtrip-network
  #   restart: unless-stopped

networks:
  medtrip-network:
    driver: bridge
    name: medtrip-network

volumes:
  prescription-db-data:
    name: prescription-db-data
